name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install --upgrade pip setuptools wheel
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install --upgrade pip setuptools wheel
      - run: pip install -e ".[dev]"
      - name: Run tests
        env:
          SERVICE_ENV: test
        run: pytest tests/ -v --tb=short -q

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install --upgrade pip setuptools wheel
      - run: pip install -e ".[dev]"
      - run: pip-audit --skip-editable 2>/dev/null || true
      - run: bandit -r src/ -ll -ii 2>/dev/null || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          tags: anomaly-detector:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

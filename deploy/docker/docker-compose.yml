version: "3.9"

services:
  anomaly-detector:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: anomaly-detector
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - SERVICE_ENV=development
      - POSTGRES_HOST=postgres
      - INFLUXDB_URL=http://influxdb:8086
      - PROMETHEUS_URL=http://prometheus:9090
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  postgres:
    image: postgres:16-alpine
    container_name: anomaly-postgres
    environment:
      POSTGRES_DB: anomaly_detector
      POSTGRES_USER: anomaly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anomaly -d anomaly_detector"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring

  influxdb:
    image: influxdb:2.7-alpine
    container_name: anomaly-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-adminpassword}
      DOCKER_INFLUXDB_INIT_ORG: anomaly-detector
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-my-super-secret-token}
    ports:
      - "8086:8086"
    volumes:
      - influxdata:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: anomaly-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.0
    container_name: anomaly-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_UID: anomaly-detector-overview
    volumes:
      - grafanadata:/var/lib/grafana
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ../grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - influxdb
    networks:
      - monitoring

  # Optional: Kafka for message-queue ingestion
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: anomaly-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - monitoring
    profiles:
      - kafka

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: anomaly-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - monitoring
    profiles:
      - kafka

volumes:
  pgdata:
  influxdata:
  grafanadata:

networks:
  monitoring:
    driver: bridge

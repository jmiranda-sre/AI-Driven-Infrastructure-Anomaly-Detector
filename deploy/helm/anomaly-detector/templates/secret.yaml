apiVersion: v1
kind: Secret
metadata:
  name: {{ include "anomaly-detector.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "anomaly-detector.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  INFLUXDB_TOKEN: {{ .Values.secrets.influxdbToken | quote }}
  {{- if .Values.secrets.slackWebhookUrl }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.pagerdutyRoutingKey }}
  PAGERDUTY_ROUTING_KEY: {{ .Values.secrets.pagerdutyRoutingKey | quote }}
  {{- end }}

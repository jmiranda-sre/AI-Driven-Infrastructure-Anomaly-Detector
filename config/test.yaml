# Test environment overrides
service:
  environment: "test"
  workers: 1
  log_level: "debug"
  port: 0                         # random port

ingestion:
  prometheus:
    enabled: false
  kafka:
    enabled: false

ml:
  models:
    isolation_forest:
      n_estimators: 10
      contamination: 0.1
    lstm_autoencoder:
      enabled: false               # skip LSTM in fast tests
    holt_winters:
      enabled: false
  training:
    min_samples: 10

database:
  postgres:
    host: "localhost"
    port: 5432
    name: "anomaly_detector_test"
  timeseries:
    type: "influxdb"

security:
  auth:
    enabled: false
    jwt:
      secret: "test-secret-key-for-testing-only"
    users: []
